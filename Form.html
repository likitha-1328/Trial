<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width", initial-scale=1.0">
    <title>From</title>
    <style>
    .form{
    
     margin: auto;
     border: solid; 
     padding:25px;
     background-color:antiquewhite;
     width:50%;
    }
    {
      background-color: aquamarine;

    }

    </style>
</head>
<body>
    <div class="form">
      <form action="next.html" method="GET" >
        <fieldset id="col">
         <legend>personal inforamtionl</legend>
          <div>
             <lable for="name">First name:</lable>
             <input type="text" name="uname" id="name" required>
             <lable for="lname">last name:</lable>
             <input type="text" name="uname" id="lname" required>

          </div>
          <div>
            <lable for="Birth">Date of birth:</lable>
             <input type="date" name="Dob" id="Birth">
          </div>
          <div>
            <lable for="contact">Number</lable>
             <input type="tel" name="number" id="contact" placeholder="+91" pattern="[0-9]{10}">
          </div>
          </fieldset>
          <div>
            <input type="radio" name="gender" id="male" value="male">
            <lable for="male">Male</lable>
             <input type="radio" name="gender" id="female" value="female">
             <lable for="female">Female</lable>
          </div>
          <div>
             <lable for="email">Email</lable>
             <input type="email" name="email" id="mail"> 
          </div>
            <div>
            <lable for="by"> birth year:</lable>
             <input type="number" name="Dob" id="by" min="1985" max="2020">
          </div>
          <div>
            <label for="place">Current State</label>
            <select name="locality" id="place">
                <option value="hyd">hyd</option>
                <option value="goa">goa</option>
            
            </select>
          </div>
          <div>
            <label for="img">Photo</label>
            <input type="file" name="photo" id="img">
          </div>
          <div>
            <label for="about">about yourself</label>
            <textarea type="text" name="yourself" id="about" row="7" column="20">wonderful</textarea>
          </div>
          <div>
                <input type="checkbox" name="mail" id="email" >
                <label for="email"> Email</label>
                <input type="checkbox" name="sms" id="sms" >
                <label for="sms"> SMS</label>
            </div>
            <div>
                <input type="checkbox" name="choice" id="agree" >
                <label for="agree"> I agree</label>
                
            </div>
          <section>
          <h2>submit</h2>
          <div>
            <button type="submit">Submit</button>
            <button type="reset">reset</button>
          </div>
          </section>
          <div>
            <lable for="phone">Phone number</lable>
            <input type="tel" name=phone id="phone" placeholder="enter number" pattern="[0-9]{10}" minlength="10" maxlength="10">
          </div>
        </form>
    </div>
    <div>
      <form action="next.html" method="GET">
        <div>
          <lable for="name">Useranme</lable>
          <input type="text" name="user" id="name">
        </div>
        <div>
           <label for="pwd"> password</label>
            <input type="password" name="password" id="pwd">
        </div>
        
        <div>
          <button type="submit">submit</button>
            <button type="reset">Reset</button>
        </div>
        
      </form>
    </div>
</body>
</html>
